site_name: Seedler Documentation
site_url: https://byuirpytooling.github.io/seedler/
theme:
  name: material
  icon:
    logo: fontawesome/solid/wind
  favicon: assets/favicon.ico
  featuers:
    - navigation.footer
  font:
    text: Merriweather Sans
    code: Red Hat Mono
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: green
      accent: deep purple

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: deep orange

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details

plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            allow_inspection: true 
            show_root_heading: true
            show_labels: true
            show_root_full_path: false
            group_by_category: true
            show_source: false
            show_if_no_docstring: true
          paths: [src]
extra:
  social:
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@byuidss
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/school/byu-idaho

copyright: Copyright &copy; 2026 J. Hathaway