name: ci
on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Build and Install Seedler
        run: |
          # This compiles the Rust and installs the package into the environment
          uv pip install . --system

      - name: Install Doc Tools
        run: |
          uv pip install mkdocs-material mkdocs-autorefs mkdocstrings[python] mkdocstrings-python mkdocs-jupyter --system

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force