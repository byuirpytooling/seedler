name: ci
on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Stable version for Rust/Python compatibility

      - name: Install uv and Build Rust Extension
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          # This builds your Rust code and installs seedler into the runner's environment
          uv pip install . --system 

      - name: Cache MkDocs
        run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install Documentation Tools
        run: |
          # Added mkdocs-jupyter in case you use notebooks
          pip install mkdocs-material mkdocs-autorefs mkdocstrings[python] mkdocstrings-python mkdocs-jupyter

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force