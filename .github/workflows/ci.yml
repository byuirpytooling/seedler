name: ci
on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Deploy to GitHub Pages
        run: |
          # 1. Install your package and doc dependencies into a managed venv
          uv pip install . mkdocs-material mkdocs-autorefs mkdocstrings[python] mkdocstrings-python mkdocs-jupyter
          
          # 2. Run the deploy command through 'uv run' so it uses that venv
          uv run mkdocs gh-deploy --force